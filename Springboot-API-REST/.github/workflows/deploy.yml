name: CI/CD back-ventas

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build y Push imagen
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest ./Springboot-API-REST
          docker push ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest

      - name: Deploy en EC2 Backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest
            sudo docker rm -f back-ventas 2>/dev/null || true
            sudo docker run --detach --name back-ventas --publish 8080:8080 \
              -e DB_ENDPOINT=mysql \
              -e DB_PORT=3306 \
              -e DB_NAME=ventas_db \
              -e DB_USERNAME=ventas_user \
              -e DB_PASSWORD=ventas_pass \
              ${{ secrets.DOCKER_USERNAME }}/back-ventas:latest